<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182642"/>
      <stop offset="1" stop-color="#3d5774"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d7a6"/>
      <stop offset="1" stop-color="#e8a45f"/>
    </linearGradient>
    <clipPath id="rr"><rect width="512" height="512" rx="112"/></clipPath>
    <clipPath id="above"><rect x="0" y="0" width="512" height="336"/></clipPath>
  </defs>
  <g clip-path="url(#rr)">
    <rect width="512" height="512" fill="url(#sky)"/>
    <rect y="336" width="512" height="176" fill="#131d2e"/>
    <g clip-path="url(#above)">
      <circle cx="256" cy="336" r="130" fill="url(#sun)"/>
    </g>
    <rect x="32" y="330" width="448" height="12" rx="6" fill="#f2c48d" opacity=".85"/>
  </g>
</svg>
