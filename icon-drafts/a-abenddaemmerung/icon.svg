<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a2b"/>
      <stop offset=".42" stop-color="#243752"/>
      <stop offset=".68" stop-color="#3d5774"/>
      <stop offset="1" stop-color="#2b3f59"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2c42"/>
      <stop offset="1" stop-color="#131d2e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d7a6"/>
      <stop offset="1" stop-color="#e8a45f"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#e8b27a" stop-opacity=".5"/>
      <stop offset=".45" stop-color="#e8b27a" stop-opacity=".16"/>
      <stop offset="1" stop-color="#e8b27a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2c48d" stop-opacity="0"/>
      <stop offset=".5" stop-color="#f2c48d" stop-opacity=".9"/>
      <stop offset="1" stop-color="#f2c48d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2c48d" stop-opacity=".35"/>
      <stop offset="1" stop-color="#f2c48d" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rr"><rect width="512" height="512" rx="112"/></clipPath>
    <clipPath id="above"><rect x="0" y="0" width="512" height="352"/></clipPath>
  </defs>
  <g clip-path="url(#rr)">
    <rect width="512" height="512" fill="url(#sky)"/>
    <!-- Sterne -->
    <g fill="#eef2f7">
      <circle cx="96" cy="86" r="3.5" opacity=".7"/>
      <circle cx="176" cy="132" r="2.4" opacity=".45"/>
      <circle cx="318" cy="72" r="2.8" opacity=".55"/>
      <circle cx="410" cy="128" r="3.2" opacity=".65"/>
      <circle cx="452" cy="60" r="2.2" opacity=".4"/>
      <circle cx="252" cy="104" r="2" opacity=".35"/>
    </g>
    <!-- Sonnenglut -->
    <circle cx="256" cy="352" r="216" fill="url(#glow)"/>
    <!-- Meer / Boden -->
    <rect y="352" width="512" height="160" fill="url(#sea)"/>
    <!-- Spiegelung: horizontale Schimmer-Balken auf dem Wasser -->
    <g fill="#f2c48d">
      <rect x="192" y="366" width="128" height="7" rx="3.5" opacity=".55"/>
      <rect x="206" y="386" width="100" height="6" rx="3" opacity=".42"/>
      <rect x="220" y="408" width="72" height="5" rx="2.5" opacity=".3"/>
      <rect x="234" y="430" width="44" height="4" rx="2" opacity=".18"/>
    </g>
    <!-- halbversunkene Sonne -->
    <g clip-path="url(#above)">
      <circle cx="256" cy="352" r="92" fill="url(#sun)"/>
    </g>
    <!-- Horizont-Hairline -->
    <rect x="56" y="350" width="400" height="4" rx="2" fill="url(#hairline)"/>
  </g>
</svg>
