<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16202e"/>
      <stop offset="1" stop-color="#0f1722"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d7a6"/>
      <stop offset="1" stop-color="#e8a45f"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#e8b27a" stop-opacity=".38"/>
      <stop offset=".55" stop-color="#e8b27a" stop-opacity=".1"/>
      <stop offset="1" stop-color="#e8b27a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Motiv um das Zentrum auf 85 % skaliert (Safe Zone der Kreis-Maske) -->
  <g transform="translate(38.4 38.4) scale(.85)">
    <circle cx="256" cy="192" r="190" fill="url(#glow)"/>
    <circle cx="256" cy="192" r="98" fill="url(#sun)"/>
    <g stroke="#f0be84" stroke-width="18" stroke-linecap="round" opacity=".95">
      <line x1="256" y1="52" x2="256" y2="24"/>
      <line x1="355" y1="93" x2="375" y2="73"/>
      <line x1="157" y1="93" x2="137" y2="73"/>
      <line x1="396" y1="192" x2="424" y2="192"/>
      <line x1="116" y1="192" x2="88" y2="192"/>
    </g>
    <g stroke-width="30" stroke-linecap="round">
      <line x1="164" y1="344" x2="146" y2="420" stroke="#5fb0e6"/>
      <line x1="264" y1="368" x2="246" y2="452" stroke="#3f95d4"/>
      <line x1="360" y1="344" x2="342" y2="420" stroke="#2f7fc4"/>
    </g>
  </g>
</svg>
