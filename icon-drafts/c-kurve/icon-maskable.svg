<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131d30"/>
      <stop offset=".6" stop-color="#1c2c44"/>
      <stop offset="1" stop-color="#273b57"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fb0e6"/>
      <stop offset=".45" stop-color="#e8b27a"/>
      <stop offset="1" stop-color="#f2c48d"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#f6cf9a" stop-opacity=".65"/>
      <stop offset=".5" stop-color="#e8b27a" stop-opacity=".18"/>
      <stop offset="1" stop-color="#e8b27a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Motiv um das Zentrum auf 88 % skaliert (Safe Zone der Kreis-Maske) -->
  <g transform="translate(30.72 30.72) scale(.88)">
    <g fill="#eef2f7">
      <circle cx="112" cy="96" r="3" opacity=".55"/>
      <circle cx="404" cy="84" r="2.6" opacity=".45"/>
      <circle cx="330" cy="140" r="2" opacity=".35"/>
      <circle cx="180" cy="64" r="2.2" opacity=".4"/>
    </g>
    <g stroke="#eef2f7" stroke-width="2" opacity=".1">
      <line x1="72" y1="392" x2="440" y2="392"/>
      <line x1="72" y1="312" x2="440" y2="312"/>
    </g>
    <circle cx="384" cy="178" r="150" fill="url(#glow)"/>
    <path d="M 78 386 C 150 386 184 336 240 296 C 296 256 336 218 384 178"
          fill="none" stroke="url(#line)" stroke-width="26" stroke-linecap="round"/>
    <circle cx="384" cy="178" r="46" fill="#f6cf9a"/>
  </g>
